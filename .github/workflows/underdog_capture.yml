name: Props Capture (Underdog + Novig)

# Snapshot MLB player prop lines throughout the day from BOTH books at the same ticks:
#   - Underdog (soft DFS book)  -> underdog_props
#   - Novig    (sharp exchange) -> novig_snapshots  (direct GraphQL, de-vigged prices)
# Time-aligned captures let us measure whether Novig-vs-Underdog discrepancies persist
# long enough to bet (the line-shopping / staleness validation).
#
# Schedule: more captures on weekends (more games, earlier starts).

on:
  # NOTE: GitHub Actions schedules run LATE under load — observed ~1-2h delay. So nominal
  # times are set EARLIER than the target, and we add extra ticks for redundancy, so every
  # game gets at least one clean PRE-GAME snapshot (scheduled_start > capture time). The
  # analysis/paper-trade layer enforces the pre-game filter regardless of when a run lands.
  schedule:
    # Weekdays (Mon-Fri). Earliest ticks target day games (~1pm ET / 17:00 UTC first pitch).
    - cron: '0 12,14,17,20,22 * * 1-5'
    # Weekends have more/earlier day games — sample a bit denser.
    - cron: '0 13,15,17,19,21,23 * * 0,6'
  workflow_dispatch:  # Manual trigger

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
      # Slim install — scrapers need requests + psycopg2 + pandas + dotenv; tzdata for
      # zoneinfo (ET game-date conversion in the Novig scraper on minimal runners).
      # Skips heavy ML libs (sklearn, xgboost, pybaseball, statsmodels) the cron doesn't need.
      - run: pip install requests psycopg2-binary pandas python-dotenv tzdata
      - name: Capture Underdog props
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m scrapers.props.underdog
      # continue-on-error: a Novig hiccup must not drop the Underdog capture (or vice-versa)
      - name: Capture Novig exchange lines
        if: always()
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m scrapers.props.novig
      # Log pre-game +EV line-shopping bets from the snapshots we just captured.
      # Pre-game filter is baked into paper_trade (scheduled_start > capture time).
      - name: Log paper-trade +EV bets
        if: always()
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m models.mlb.trading.paper_trade log
