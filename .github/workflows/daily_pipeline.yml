name: Daily MLB Pipeline

on:
  schedule:
    # Run at 10:30 PM UTC (6:30 PM ET) — after lineups posted, before games start
    - cron: '30 22 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  daily-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/daily_pipeline.py

      - name: Morning data refresh
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/daily_refresh.py
