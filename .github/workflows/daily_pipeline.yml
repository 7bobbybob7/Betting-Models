name: Daily MLB Refresh

# Morning data refresh: pulls yesterday's game scores, box scores, and Statcast
# pitch data from MLB Stats API and Baseball Savant. Essential for keeping
# hitter outcome data and pitch-level data current (used by hitter prop models).
#
# Totals prediction crons (midday + evening) were disabled June 2026 after
# live test confirmed all 3 totals models were unprofitable
# (see TOTALS_LIVE_TEST_FINDINGS.md).

on:
  schedule:
    # 10:00 UTC = 6:00 AM ET — pull yesterday's data
    - cron: '0 10 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  morning-refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt

      - name: Refresh games + box scores
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/daily_refresh.py

      - name: Pull last 3 days of Statcast (with safety overlap)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m scrapers.mlb.statcast_daily --days 3

      # Keep pitch extras current (catcher/framing, spray, bat tracking, swing path).
      # Idempotent — rolling 4-day window just tops up what the backfill already has.
      - name: Top up pitch extras (rolling 4 days)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m scrapers.mlb.backfill_pitch_extras --start "$(date -u -d '4 days ago' +%F)"

      - name: Backfill handedness for any new players (rookies, call-ups)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m scrapers.mlb.backfill_player_handedness --new-only

      # Settle yesterday's paper-trade bets now that box scores are in
      - name: Settle paper-trade bets
        if: always()
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m models.mlb.trading.paper_trade settle

      # Pull prop lines + results from BettingPros (Underdog 36 + Novig 60). Was never
      # cronned before 2026-07 — data silently stopped at the last manual backfill.
      # Trailing 3 days so late-scored actuals get refreshed.
      # Pull default books (Underdog 36, Novig 60, Consensus 0) + DraftKings 12 (for the
      # DK-RBI singles tracker). Trailing 3 days so late-scored actuals refresh.
      - name: Pull BettingPros props (trailing 3 days)
        if: always()
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python -m scrapers.props.bettingpros --start "$(date -u -d '3 days ago' +%F)" --end "$(date -u +%F)"
          python -m scrapers.props.bettingpros --start "$(date -u -d '3 days ago' +%F)" --end "$(date -u +%F)" --books 12

      # Score yesterday's TB props with the v3 model (Attack 3 winner) — retrospective,
      # leak-safe by construction; accumulates forward OOS evidence in v3_signals.
      # Runs AFTER the BettingPros pull (needs its odds + actuals).
      - name: Log v3 TB model signals
        if: always()
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m models.mlb.hitter.v3_tracker log --days 2

      # Forward-track the venue-sweep survivor: DK RBI 0.5 singles vs Novig fair.
      - name: Log DK RBI singles signals
        if: always()
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m models.mlb.trading.dk_rbi_tracker log --days 3
