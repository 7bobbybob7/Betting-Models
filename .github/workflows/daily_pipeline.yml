name: Daily MLB Pipeline

on:
  schedule:
    # Morning (10:00 AM UTC = 6:00 AM ET): backfill only — outcomes, edges, P&L from yesterday
    - cron: '0 10 * * *'
    # Midday (3:30 PM UTC = 11:30 AM ET): predictions for day games + early odds
    - cron: '30 15 * * *'
    # Evening (10:30 PM UTC = 6:30 PM ET): predictions for night games + near-closing odds
    - cron: '30 22 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  morning-backfill:
    if: github.event.schedule == '0 10 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Data refresh (yesterday's results)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/daily_refresh.py
      - name: Backfill outcomes and P&L
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/backfill_outcomes.py

  midday-predictions:
    if: github.event.schedule == '30 15 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Run daily pipeline (day games)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/daily_pipeline.py

  evening-predictions:
    if: github.event.schedule == '30 22 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Run daily pipeline (night games)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/daily_pipeline.py
      - name: Backfill any remaining outcomes
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/backfill_outcomes.py
